<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>To-Do List</title>
<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: #111827; /* dark background */
    color: #e5e7eb;
    text-align: center;
    padding: 50px;
}

h1 {
    color: #38bdf8; /* light blue accent */
    margin-bottom: 20px;
}

p {
    color: #cbd5f5;
    margin-bottom: 30px;
}

ul {
    list-style: none;
    padding: 0;
    max-width: 400px;
    margin: auto;
}

li {
    background: #1f2937;
    padding: 12px;
    margin: 10px 0;
    border-radius: 8px;
    text-align: left;
    transition: 0.3s;
}

li:hover {
    background: #2563eb; /* slightly brighter on hover */
}

a {
    color: #a78bfa;
    text-decoration: none;
    margin-top: 30px;
    display: inline-block;
    transition: 0.3s;
}

a:hover {
    text-shadow: 0 0 8px rgba(167,139,250,0.7);
}
</style>
</head>
<body>

<h1>To-Do List App</h1>
<p>Minimal to-do list interface.</p>

<ul>
  <li>Learn C Programming</li>
  <li>Build Portfolio</li>
  <li>Practice HTML & CSS</li>
  <li>Complete Mini Projects</li>
</ul>

<a href="index.html">Back to Portfolio</a>

</body>
</html>
